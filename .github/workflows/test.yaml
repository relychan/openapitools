name: Unit tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  lint:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Format
        run: diff -u <(echo -n) <(gofmt -d -s .)

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: Check for schema changes
        run: |
          make build-jsonschema

          # Check only for changes to jsonschema/openapitools.schema.json file
          CHANGED_JSON_FILES=$(git status --porcelain jsonschema/openapitools.schema.json || true)
          if [ -n "$CHANGED_JSON_FILES" ]; then
            echo "❌ JSON Schema have changed!"
            echo ""
            git diff jsonschema/openapitools.schema.json
            echo ""
            echo "Please run 'make build-jsonschema' and commit the changes."
            exit 1
          else
            echo "✅ Schema is up to date!"
          fi

      - name: Test
        run: |
          make test
      - name: Go coverage format
        if: ${{ github.event_name == 'pull_request' && github.repository == 'relychan/openapitools' }}
        run: |
          go get github.com/boumenot/gocover-cobertura
          go install github.com/boumenot/gocover-cobertura
          gocover-cobertura < coverage.out > coverage.xml
      - name: Code Coverage Summary Report
        if: ${{ github.event_name == 'pull_request' && github.repository == 'relychan/openapitools' }}
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "50 80"
      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          path: code-coverage-results.md
      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2
