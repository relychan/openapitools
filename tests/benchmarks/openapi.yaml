# yaml-language-server: $schema=../../jsonschema/openapitools.schema.json
spec:
  openapi: "3.2.0"
  servers:
    - url: "{SERVER_URL}"
  paths:
    /mock:
      get: {}
    /users:
      get:
        x-rely-proxy-action:
          type: graphql
          request:
            url: /graphql
            method: GET
            query: query GetUsers { users { id }}
      post:
        x-rely-proxy-action:
          type: graphql
          request:
            url: /graphql
            method: POST
            query: query GetUsers { users { id }}
